name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: 🏗️ Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Environment
        uses: ./.github/actions/setup-shellmind
        with:
          python-version: '3.10'
          install-dev: 'true'
      - name: Cache environment
        run: echo "Environment initialized and cached"

  validation:
    name: 🛡️ Project Validation
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Environment
        uses: ./.github/actions/setup-shellmind
        with:
          python-version: '3.10'
          install-dev: 'true'
      - name: Validate pyproject.toml
        run: |
          echo "::group::Validating pyproject.toml"
          validate-pyproject pyproject.toml
          echo "::endgroup::"
      - name: Project Structure Check
        run: |
          echo "::group::Checking project structure"
          ls -R shellmind/
          echo "::endgroup::"

  lint:
    name: 🧹 Lint (Ruff)
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Environment
        uses: ./.github/actions/setup-shellmind
        with:
          python-version: '3.10'
          install-dev: 'true'
      - name: Run Ruff
        run: |
          echo "::group::Running Ruff Check"
          ruff check .
          echo "::endgroup::"
          echo "::group::Running Ruff Format Check"
          ruff format --check .
          echo "::endgroup::"

  typecheck:
    name: 📝 Type Check (Mypy)
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Environment
        uses: ./.github/actions/setup-shellmind
        with:
          python-version: '3.10'
          install-dev: 'true'
      - name: Run Mypy
        run: |
          echo "::group::Running Mypy"
          mypy shellmind/
          echo "::endgroup::"

  security-scan:
    name: 🔍 Security Scan (Bandit)
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Environment
        uses: ./.github/actions/setup-shellmind
        with:
          python-version: '3.10'
          install-dev: 'true'
      - name: Run Bandit
        run: |
          echo "::group::Running Bandit"
          bandit -r shellmind/
          echo "::endgroup::"

  infra-gate:
    name: ⚖️ Infrastructure Gate
    needs: [validation, lint, typecheck, security-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Validation Summary
        run: |
          echo "### Infrastructure Validation Passed" >> $GITHUB_STEP_SUMMARY
          echo "Static analysis and project structure checks are complete." >> $GITHUB_STEP_SUMMARY

  unit-tests:
    name: 🧪 Unit Tests (${{ matrix.os }}, ${{ matrix.python-version }})
    needs: infra-gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Environment
        uses: ./.github/actions/setup-shellmind
        with:
          python-version: ${{ matrix.python-version }}
          install-dev: 'true'
      - name: Run Pytest
        run: |
          pytest tests/test_ai.py

  integration-tests:
    name: 🔗 Integration Tests (${{ matrix.os }}, ${{ matrix.python-version }})
    needs: infra-gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Environment
        uses: ./.github/actions/setup-shellmind
        with:
          python-version: ${{ matrix.python-version }}
          install-dev: 'true'
      - name: Run Integration Tests
        run: |
          pytest tests/test_tools.py

  quality-gate:
    name: 🏁 Quality Gate
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate Results
        run: |
          echo "### Quality Gate Passed" >> $GITHUB_STEP_SUMMARY
          echo "All validation, linting, security, and tests have passed across all platforms." >> $GITHUB_STEP_SUMMARY

  build-sdist:
    name: 📦 Build SDist
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Environment
        uses: ./.github/actions/setup-shellmind
        with:
          python-version: '3.10'
          install-dev: 'true'
      - name: Build SDist
        run: python -m build --sdist
      - name: Upload SDist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/

  build-wheel:
    name: 🎡 Build Wheel
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Environment
        uses: ./.github/actions/setup-shellmind
        with:
          python-version: '3.10'
          install-dev: 'true'
      - name: Build Wheel
        run: python -m build --wheel
      - name: Upload Wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/

  package-verify:
    name: 🎁 Package Verification
    needs: [build-sdist, build-wheel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download SDist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/
      - name: Download Wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist/
      - name: Setup Environment
        uses: ./.github/actions/setup-shellmind
        with:
          python-version: '3.10'
          install-dev: 'true'
      - name: Check Package
        run: twine check dist/*

  artifact-upload:
    name: 📤 Finalize Artifacts
    needs: package-verify
    runs-on: ubuntu-latest
    steps:
      - name: Log finalization
        run: echo "Artifacts finalized and ready for release."

  preview-deploy:
    name: 🚀 Preview Deploy
    needs: artifact-upload
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Simulate Deploy
        run: echo "Simulating deployment for PR preview..."

  notifications:
    name: 🔔 Notifications
    needs: [artifact-upload, preview-deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "### Pipeline Finished" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
